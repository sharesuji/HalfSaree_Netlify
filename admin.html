<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSVP Admin · Varnika's Half Saree Ceremony</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --magenta:#6B0F3A; --gold:#C9983A; --plum:#2D1B3D; --muted:#7A6270; --purple:#6b3fa0; }
    body { font-family:'Jost',sans-serif; background:#f5eff7; color:var(--plum); min-height:100svh; }

    #login-screen { display:flex; align-items:center; justify-content:center; min-height:100svh; padding:2rem; }
    .login-box { background:#fff; padding:3rem 2.5rem; max-width:420px; width:100%; box-shadow:0 4px 40px rgba(44,27,61,0.12); }
    .login-box h1 { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:300; color:var(--magenta); margin-bottom:0.2rem; }
    .login-box .sub { font-size:0.8rem; color:var(--muted); margin-bottom:2rem; }
    .field-label { display:block; font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-bottom:0.4rem; margin-top:1rem; }
    .field-input { width:100%; padding:0.75rem 1rem; border:1px solid #ddd; font-family:'Jost',sans-serif; font-size:0.95rem; outline:none; transition:border-color 0.2s; }
    .field-input:focus { border-color:var(--magenta); }
    .field-hint { font-size:0.72rem; color:var(--muted); margin-top:0.3rem; line-height:1.5; }
    .field-hint a { color:var(--magenta); }
    .login-btn { width:100%; padding:0.85rem; background:var(--magenta); color:#fff; border:none; font-family:'Jost',sans-serif; font-size:0.8rem; letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; margin-top:1.5rem; }
    .login-btn:hover { background:var(--plum); }
    .login-btn:disabled { opacity:0.5; cursor:not-allowed; }
    #login-error { color:#c0392b; font-size:0.82rem; margin-top:0.75rem; display:none; }

    #admin-panel { display:none; }
    .admin-header { background:var(--plum); color:#fff; padding:1.25rem 2rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; }
    .admin-header h1 { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:1.4rem; }
    .admin-header h1 span { color:var(--gold); }
    .hdr-btns { display:flex; gap:0.75rem; }
    .hdr-btn { background:transparent; border:1px solid rgba(255,255,255,0.3); color:#fff; padding:0.4rem 1rem; font-family:'Jost',sans-serif; font-size:0.7rem; letter-spacing:0.15em; cursor:pointer; text-transform:uppercase; }
    .hdr-btn:hover { background:rgba(255,255,255,0.12); }

    .admin-body { padding:2rem; max-width:1060px; margin:0 auto; }
    .loading-state { text-align:center; padding:3rem 1rem; color:var(--muted); }
    .spinner { width:32px; height:32px; margin:0 auto 1rem; border:3px solid #e0d0e8; border-top-color:var(--magenta); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .stats-row { display:flex; gap:1rem; margin-bottom:1.75rem; flex-wrap:wrap; }
    .stat-card { background:#fff; padding:1.4rem; flex:1; min-width:120px; box-shadow:0 2px 12px rgba(44,27,61,0.06); text-align:center; border-top:3px solid var(--magenta); }
    .stat-card.bless { border-top-color:var(--purple); }
    .stat-num { font-family:'Cormorant Garamond',serif; font-size:2.4rem; line-height:1; color:var(--magenta); }
    .stat-card.bless .stat-num { color:var(--purple); }
    .stat-label { font-size:0.62rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-top:0.3rem; }

    .tab-row { display:flex; border-bottom:2px solid #e8dff0; }
    .tab-btn { padding:0.65rem 1.4rem; border:none; background:transparent; font-family:'Jost',sans-serif; font-size:0.72rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; }
    .tab-btn.active { color:var(--magenta); border-bottom-color:var(--magenta); font-weight:600; }
    .tab-btn.active.bless-tab { color:var(--purple); border-bottom-color:var(--purple); }

    .table-wrap { background:#fff; box-shadow:0 2px 12px rgba(44,27,61,0.06); overflow-x:auto; }
    .table-header { padding:1.1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #eee; flex-wrap:wrap; gap:0.5rem; }
    .table-header h2 { font-size:0.82rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; }
    .export-btn { padding:0.4rem 1rem; background:var(--gold); color:var(--plum); border:none; font-family:'Jost',sans-serif; font-size:0.7rem; letter-spacing:0.15em; text-transform:uppercase; cursor:pointer; font-weight:500; }
    .export-btn:hover { background:#b5852a; color:#fff; }
    table { width:100%; border-collapse:collapse; font-size:0.9rem; }
    thead th { padding:0.7rem 1.2rem; text-align:left; font-size:0.63rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); background:#faf8fc; border-bottom:1px solid #eee; white-space:nowrap; }
    tbody td { padding:0.85rem 1.2rem; border-bottom:1px solid #f0ecf5; vertical-align:top; }
    tbody tr:last-child td { border-bottom:none; }
    tbody tr:hover td { background:#fdf8ff; }
    .badge { display:inline-block; padding:0.2rem 0.6rem; background:#f0e6f6; color:var(--magenta); font-size:0.7rem; border-radius:20px; font-weight:500; }
    .badge.bless { background:#ede6f6; color:var(--purple); }
    .blessing-msg { font-style:italic; color:var(--muted); font-size:0.86rem; margin-top:0.25rem; }
    .empty-state { padding:4rem 2rem; text-align:center; color:var(--muted); }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>Admin Access</h1>
    <p class="sub">Varnika's Half Saree Ceremony · RSVP Dashboard</p>

    <label class="field-label">Netlify Personal Access Token</label>
    <input class="field-input" type="password" id="inp-token" placeholder="nfp_xxxxxxxxxxxx" />
    <p class="field-hint">
      <a href="https://app.netlify.com/user/applications#personal-access-tokens" target="_blank">Create one here</a>
      → User settings → Applications → New access token
    </p>

    <label class="field-label">Admin Password</label>
    <input class="field-input" type="password" id="inp-pwd" placeholder="Enter admin password"
      onkeydown="if(event.key==='Enter')doLogin()" />

    <button class="login-btn" id="login-btn" onclick="doLogin()">View RSVPs</button>
    <p id="login-error"></p>
  </div>
</div>

<div id="admin-panel">
  <div class="admin-header">
    <h1>RSVP Admin · <span>Varnika's Half Saree Ceremony</span></h1>
    <div class="hdr-btns">
      <a class="hdr-btn" href="/" style="text-decoration:none">⌂ Home</a>
      <button class="hdr-btn" onclick="loadRSVPs()">↻ Refresh</button>
      <button class="hdr-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  <div class="admin-body">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="stat-attending">—</div><div class="stat-label">Attending</div></div>
      <div class="stat-card bless"><div class="stat-num" id="stat-blessings">—</div><div class="stat-label">Blessings</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-guests">—</div><div class="stat-label">Total Guests</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-email">—</div><div class="stat-label">With Email</div></div>
    </div>
    <div class="tab-row">
      <button class="tab-btn active" id="tab-all"       onclick="switchTab('all')">All RSVPs</button>
      <button class="tab-btn"        id="tab-attending" onclick="switchTab('attending')">🌸 Attending</button>
      <button class="tab-btn bless-tab" id="tab-bless"  onclick="switchTab('bless')">🙏 Blessings</button>
    </div>
    <div class="table-wrap">
      <div class="table-header">
        <h2 id="table-title">All Responses</h2>
        <button class="export-btn" onclick="exportCSV()">Export CSV</button>
      </div>
      <div id="table-body"><div class="loading-state"><div class="spinner"></div><p>Loading…</p></div></div>
    </div>
  </div>
</div>

<script>
  const SITE_ID       = 'eb6ef7f1-93fa-4cd1-8e6d-c675eff158cf';
  const LOCAL_PASSWORD = 'Varnika2026';
  let allRsvps = [];
  let currentTab = 'all';

  function doLogin() {
    const token = document.getElementById('inp-token').value.trim();
    const pwd   = document.getElementById('inp-pwd').value.trim();
    const errEl = document.getElementById('login-error');
    const btn   = document.getElementById('login-btn');

    errEl.style.display = 'none';
    if (!token) { errEl.textContent = 'Please enter your Netlify access token.'; errEl.style.display = 'block'; return; }
    if (pwd !== LOCAL_PASSWORD) { errEl.textContent = 'Incorrect admin password.'; errEl.style.display = 'block'; return; }

    btn.disabled = true; btn.textContent = 'Loading…';
    sessionStorage.setItem('v_token', token);
    sessionStorage.setItem('v_auth', '1');
    showAdmin();
  }

  function doLogout() {
    sessionStorage.clear();
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-btn').disabled = false;
    document.getElementById('login-btn').textContent = 'View RSVPs';
    allRsvps = [];
  }

  function showAdmin() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    loadRSVPs();
  }

  async function loadRSVPs() {
    const token = sessionStorage.getItem('v_token');
    const tb    = document.getElementById('table-body');
    tb.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Fetching RSVPs from Netlify…</p></div>';
    ['stat-attending','stat-blessings','stat-guests','stat-email'].forEach(id => document.getElementById(id).textContent = '—');

    try {
      // Step 1: get forms
      const fRes = await fetch(`https://api.netlify.com/api/v1/sites/${SITE_ID}/forms`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (fRes.status === 401) throw new Error('Token invalid or expired — please sign out and use a fresh token.');
      if (!fRes.ok) throw new Error(`Forms API error: ${fRes.status}`);

      const forms = await fRes.json();

      // Show all available forms in console for debugging
      console.log('All Netlify forms:', forms.map(f => f.name + ' (id:' + f.id + ', submissions:' + f.submission_count + ')'));

      // Try to find rsvp form — check all possible name variations
      const form = forms.find(f =>
        f.name === 'rsvp' ||
        f.name === 'RSVP' ||
        f.name.toLowerCase().includes('rsvp')
      );

      if (!form) {
        const formNames = forms.length
          ? 'Forms found: ' + forms.map(f => '"' + f.name + '" (' + f.submission_count + ' submissions)').join(', ')
          : 'No forms found at all on this site.';
        tb.innerHTML = `<div class="empty-state"><div style="font-size:2rem">🌸</div>
          <p style="font-weight:500">No RSVP form found on this Netlify site.</p>
          <p style="margin-top:0.75rem;font-size:0.82rem;color:#c0392b">${formNames}</p>
          <p style="margin-top:0.75rem;font-size:0.8rem;max-width:420px;margin-left:auto;margin-right:auto">
            This usually means no one has submitted an RSVP yet on this deployment, OR
            the hidden form tag wasn't detected by Netlify on deploy.<br/><br/>
            <strong>Fix:</strong> Submit one test RSVP on the live site, then click Refresh.
          </p></div>`;
        return;
      }

      console.log('Found form:', form.name, 'with', form.submission_count, 'submissions');

      // Step 2: get submissions
      let all = [], page = 1;
      while (true) {
        const sRes = await fetch(
          `https://api.netlify.com/api/v1/forms/${form.id}/submissions?per_page=100&page=${page}`,
          { headers: { Authorization: `Bearer ${token}` } }
        );
        if (!sRes.ok) throw new Error(`Submissions error: ${sRes.status}`);
        const batch = await sRes.json();
        if (!Array.isArray(batch) || !batch.length) break;
        all = all.concat(batch);
        if (batch.length < 100) break;
        page++;
      }

      allRsvps = all.map(s => ({
        name:    s.data?.name    || '',
        email:   s.data?.email   || '',
        phone:   s.data?.phone   || '',
        guests:  s.data?.guests  || '0',
        type:    s.data?.type    || 'yes',
        message: s.data?.message || '',
        submittedAt: s.created_at || '',
      }));

      updateStats();
      renderTable(currentTab);

    } catch(err) {
      tb.innerHTML = `<div class="empty-state">
        <div style="font-size:2rem">⚠️</div>
        <p style="color:#c0392b;font-weight:500">${escHtml(err.message)}</p>
        <p style="margin-top:1rem;font-size:0.8rem">
          <a href="#" onclick="doLogout();return false" style="color:var(--magenta)">← Sign out and try again</a>
        </p></div>`;
    }
  }

  function updateStats() {
    const att   = allRsvps.filter(r => r.type !== 'bless');
    const bless = allRsvps.filter(r => r.type === 'bless');
    document.getElementById('stat-attending').textContent = att.length;
    document.getElementById('stat-blessings').textContent = bless.length;
    document.getElementById('stat-guests').textContent    = att.reduce((s,r) => s+(parseInt(r.guests)||0)+1, 0);
    document.getElementById('stat-email').textContent     = allRsvps.filter(r => r.email).length;
  }

  function switchTab(tab) {
    currentTab = tab;
    ['all','attending','bless'].forEach(t => document.getElementById('tab-'+t).classList.toggle('active', t===tab));
    renderTable(tab);
  }

  function renderTable(tab) {
    const tb     = document.getElementById('table-body');
    const titles = { all:'All Responses', attending:'Attending', bless:'Sending Blessings' };
    document.getElementById('table-title').textContent = titles[tab];

    let rows = [...allRsvps].reverse();
    if (tab === 'attending') rows = rows.filter(r => r.type !== 'bless');
    if (tab === 'bless')     rows = rows.filter(r => r.type === 'bless');

    if (!rows.length) {
      tb.innerHTML = `<div class="empty-state"><div style="font-size:2rem">${tab==='bless'?'🙏':'🌸'}</div><p>No ${tab==='bless'?'blessings':'RSVPs'} yet.</p></div>`;
      return;
    }

    const isAll = tab === 'all';
    tb.innerHTML = `<table>
      <thead><tr>
        <th>Name</th>${isAll?'<th>Status</th>':''}
        <th>Contact</th><th>Guests</th><th>Submitted</th>
      </tr></thead>
      <tbody>${rows.map(r => {
        const isBless = r.type === 'bless';
        const date    = new Date(r.submittedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        const contact = isBless ? '<span style="color:#bbb">—</span>'
          : `${r.email ? escHtml(r.email) : '<span style="color:#bbb">—</span>'}${r.phone?'<br/><span style="font-size:0.8rem;color:var(--muted)">'+escHtml(r.phone)+'</span>':''}`;
        const guests  = isBless ? '<span style="color:#bbb">—</span>'
          : (parseInt(r.guests)>0 ? `+${r.guests} guest${r.guests>1?'s':''}` : 'Solo');
        const msg     = isBless && r.message ? `<div class="blessing-msg">"${escHtml(r.message)}"</div>` : '';
        return `<tr>
          <td><strong>${escHtml(r.name)}</strong>${msg}</td>
          ${isAll?`<td><span class="badge${isBless?' bless':''}">${isBless?'🙏 Blessings':'🌸 Attending'}</span></td>`:''}
          <td>${contact}</td><td>${guests}</td>
          <td style="color:var(--muted);font-size:0.8rem;white-space:nowrap">${date}</td>
        </tr>`;
      }).join('')}</tbody></table>`;
  }

  function exportCSV() {
    let rows = [...allRsvps].reverse();
    if (currentTab==='attending') rows = rows.filter(r=>r.type!=='bless');
    if (currentTab==='bless')     rows = rows.filter(r=>r.type==='bless');
    const csv = [
      ['Name','Type','Email','Phone','Additional Guests','Blessing','Submitted'].join(','),
      ...rows.map(r=>[r.name,r.type==='bless'?'Blessings':'Attending',r.email||'',r.phone||'',r.guests||'0',r.message||'',r.submittedAt]
        .map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','))
    ].join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    a.download = `varnika-rsvps.csv`; a.click();
  }

  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  if (sessionStorage.getItem('v_auth')==='1' && sessionStorage.getItem('v_token')) showAdmin();
</script>
</body>
</html>
